name: Daily Rebuild

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  empty-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Push empty commit
        run: |
          git commit --allow-empty -m "chore: trigger daily rebuild"
          git push
